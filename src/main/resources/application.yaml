spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/teste-softplan
    driver-class-name: org.postgresql.Driver
    username: postgress # ${DB_USERNAME}
    password: root      # ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never
app:
  security:
    basic:
      username: ${USERNAME}
      password: ${PASSWORD}
logging:
  level:
    root: INFO
spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    database-platform: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: always
app:
  security:
    basic:
      username: ${USERNAME:softplan}
      password: ${PASSWORD:softplan123}
logging:
  level:
    root: INFO
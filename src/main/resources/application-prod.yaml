spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:jdbc:h2:mem:testdb}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:create-drop}
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    database-platform: ${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
  sql:
    init:
      mode: always
app:
  security:
    basic:
      username: ${USERNAME:softplan}
      password: ${PASSWORD:softplan123}
logging:
  level:
    root: ${LOG_LEVEL:INFO}

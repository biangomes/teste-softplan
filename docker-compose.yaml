services:
  backend:
    build:
      context: .
    container_name: backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://localhost:5432/teste_softplan
      DB_USERNAME: postgres
      DB_PASSWORD: root
      USERNAME: softplan
      PASSWORD: softplan123
    depends_on:
      - db

  frontend:
    build:
      context: ./teste-softplan-web
    container_name: frontend
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://localhost:8080/
    depends_on:
      - backend

  db:
    image: postgres:15
    container_name: db
    environment:
      POSTGRES_DB: jdbc:postgresql://localhost:5432/teste_softplan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root